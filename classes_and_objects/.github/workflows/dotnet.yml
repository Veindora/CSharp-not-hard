name: .NET Core Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore classes_and_objects/SIT232_Practical_2.1P.slnx
    - name: Build
      run: dotnet build classes_and_objects/SIT232_Practical_2.1P.slnx --no-restore
    - name: Test
      run: dotnet test classes_and_objects/SIT232_Practical_2.1P.slnx --no-build --verbosity normal
